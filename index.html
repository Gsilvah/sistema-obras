<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Controle de Obras</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}

header {
  background:#2c3e50;
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
  gap:15px;
}

header img {
  height:60px;
}

.container {
  padding:20px;
}

input, select {
  padding:8px;
  margin:5px;
}

button {
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}

.salvar { background:#27ae60; color:white; }
.pdf { background:#c0392b; color:white; }
.excel { background:#2980b9; color:white; }

table {
  width:100%;
  border-collapse: collapse;
  margin-top:20px;
  background:white;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:left;
}

tr:hover {
  background:#f1f1f1;
  cursor:pointer;
}

/* cores por tipo */
.recape { background:#fdecea; }
.pavimentacao { background:#eafaf1; }
.sarjeta { background:#eaf2ff; }

.actions {
  display:none;
}

tr.active .actions {
  display:block;
}
</style>

</head>

<h2>Sistema de Controle de Obras</h2>
</header>

<div class="container">

<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="solicitante" placeholder="Solicitante">
<input id="memorando" placeholder="Memorando">

<select id="tipo">
<option value="">Tipo de Obra</option>
<option value="recape">Recape</option>
<option value="pavimentacao">Pavimentação</option>
<option value="sarjeta">Sarjeta/Canaleta</option>
</select>

<button class="salvar" onclick="salvar()">Salvar</button>
<button class="pdf" onclick="gerarPDF()">PDF</button>
<button class="excel" onclick="gerarExcel()">Excel</button>

<br>

<input id="busca" placeholder="Buscar..." onkeyup="filtrar()">

<table id="tabela">
<thead>
<tr>
<th>Data</th>
<th>Rua</th>
<th>Bairro</th>
<th>Solicitante</th>
<th>Memorando</th>
<th>Tipo</th>
<th class="actions">Ações</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("obras")) || [];
let editIndex = null;

function salvar() {
  let item = {
    data: new Date().toLocaleDateString(),
    rua: rua.value,
    bairro: bairro.value,
    solicitante: solicitante.value,
    memorando: memorando.value,
    tipo: tipo.value
  };

  if(editIndex !== null){
    dados[editIndex] = item;
    editIndex = null;
  } else {
    dados.push(item);
  }

  localStorage.setItem("obras", JSON.stringify(dados));
  limpar();
  render();
}

function limpar(){
  rua.value = "";
  bairro.value = "";
  solicitante.value = "";
  memorando.value = "";
  tipo.value = "";
}

function render(){
  let tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  dados.forEach((d,i)=>{
    let tr = document.createElement("tr");
    tr.className = d.tipo;

    tr.onclick = () => {
      document.querySelectorAll("tr").forEach(t=>t.classList.remove("active"));
      tr.classList.add("active");
    }

    tr.innerHTML = `
      <td>${d.data}</td>
      <td>${d.rua}</td>
      <td>${d.bairro}</td>
      <td>${d.solicitante}</td>
      <td>${d.memorando}</td>
      <td>${d.tipo}</td>
      <td class="actions">
        <button onclick="editar(${i})">✏️</button>
        <button onclick="excluir(${i})">🗑️</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

function editar(i){
  let d = dados[i];
  rua.value = d.rua;
  bairro.value = d.bairro;
  solicitante.value = d.solicitante;
  memorando.value = d.memorando;
  tipo.value = d.tipo;
  editIndex = i;
}

function excluir(i){
  if(confirm("Excluir registro?")){
    dados.splice(i,1);
    localStorage.setItem("obras", JSON.stringify(dados));
    render();
  }
}

function filtrar(){
  let termo = busca.value.toLowerCase();
  document.querySelectorAll("#tabela tbody tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(termo) ? "" : "none";
  });
}

function gerarPDF(){
  let conteudo = document.getElementById("tabela").outerHTML;
  let win = window.open("");
  win.document.write("<h3>Relatório de Obras</h3>" + conteudo);
  win.print();
}

function gerarExcel(){
  let tabela = document.getElementById("tabela").outerHTML;
  let blob = new Blob([tabela], {type:"application/vnd.ms-excel"});
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url;
  a.download = "obras.xls";
  a.click();
}

render();
</script>

</body>
</html>
