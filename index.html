<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Profissional de Obras</title>
<style>
body { font-family: Arial; padding:20px; }
h2 { text-align:center }
input, select { padding:8px; margin:4px; width:100%; }
button { padding:10px; margin:5px; cursor:pointer }
table { width:100%; border-collapse: collapse; margin-top:20px }
th, td { border:1px solid #000; padding:6px }
.bg-blue { background:#dbeafe }
.bg-green { background:#dcfce7 }
.bg-yellow { background:#fef9c3 }
.topo { text-align:center; margin-bottom:20px }
.logo { width:120px }
</style>
</head>
<body>

<div class="topo">
<img src="COLE_SUA_LOGO_BASE64_AQUI" class="logo">
<h2>Secretaria de Obras e Habitação</h2>
</div>

<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="solicitante" placeholder="Solicitante">
<input id="memorando" placeholder="Memorando">

<select id="tipo">
<option value="">Tipo de obra</option>
<option>Recape</option>
<option>Pavimentação</option>
<option>Sarjeta/Canaleta</option>
</select>

<input type="date" id="data">

<hr>

<input id="filtroBusca" placeholder="Buscar rua ou solicitante" oninput="render()">
<input id="filtroBairro" placeholder="Filtrar por bairro" oninput="render()">
<select id="filtroTipo" onchange="render()">
<option value="">Todos os tipos</option>
<option>Recape</option>
<option>Pavimentação</option>
<option>Sarjeta/Canaleta</option>
</select>

<button onclick="salvar()">Salvar</button>
<button onclick="exportarPDF()">Exportar PDF</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<table id="tabela">
<thead>
<tr>
<th>Nº</th>
<th>Rua</th>
<th>Bairro</th>
<th>Tipo</th>
<th>Solicitante</th>
<th>Memorando</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let registros = JSON.parse(localStorage.getItem("obras")) || [];
let editando = null;

function cor(tipo) {
 if (tipo === "Recape") return "bg-blue";
 if (tipo === "Pavimentação") return "bg-green";
 if (tipo === "Sarjeta/Canaleta") return "bg-yellow";
 return "";
}

function salvar() {
 const r = {
  rua: rua.value,
  bairro: bairro.value,
  solicitante: solicitante.value,
  memorando: memorando.value,
  tipo: tipo.value,
  data: data.value
 };

 if (!r.rua || !r.bairro || !r.tipo) return alert("Preencha os campos obrigatórios");

 if (editando != null) {
  registros[editando] = r;
  editando = null;
 } else {
  r.numero = registros.length + 1;
  registros.unshift(r);
 }

 salvarLocal();
 limpar();
 render();
}

function editar(i) {
 const r = registros[i];
 rua.value = r.rua;
 bairro.value = r.bairro;
 solicitante.value = r.solicitante;
 memorando.value = r.memorando;
 tipo.value = r.tipo;
 data.value = r.data;
 editando = i;
}

function excluir(i) {
 if (!confirm("Excluir registro?")) return;
 registros.splice(i,1);
 salvarLocal();
 render();
}

function salvarLocal() {
 localStorage.setItem("obras", JSON.stringify(registros));
}

function limpar() {
 rua.value = "";
 bairro.value = "";
 solicitante.value = "";
 memorando.value = "";
 tipo.value = "";
 data.value = "";
}

function render() {
 const busca = filtroBusca.value.toLowerCase();
 const bairroFiltro = filtroBairro.value.toLowerCase();
 const tipoFiltro = filtroTipo.value;

 const tbody = document.querySelector("tbody");
 tbody.innerHTML = "";

 registros
 .filter(r =>
  (r.rua.toLowerCase().includes(busca) || r.solicitante.toLowerCase().includes(busca)) &&
  (bairroFiltro ? r.bairro.toLowerCase().includes(bairroFiltro) : true) &&
  (tipoFiltro ? r.tipo === tipoFiltro : true)
 )
 .forEach((r,i) => {
  const tr = document.createElement("tr");
  tr.className = cor(r.tipo);

  tr.innerHTML = `
   <td>${r.numero}</td>
   <td onclick="editar(${i})">${r.rua}</td>
   <td>${r.bairro}</td>
   <td>${r.tipo}</td>
   <td>${r.solicitante}</td>
   <td>${r.memorando}</td>
   <td>${r.data}</td>
   <td>
     <button onclick="editar(${i})">Editar</button>
     <button onclick="excluir(${i})">Excluir</button>
   </td>
  `;

  tbody.appendChild(tr);
 });
}

function exportarPDF() {
 const win = window.open('', '_blank');
 const tabela = document.getElementById("tabela").outerHTML;

 win.document.write(`
 <html>
 <head>
 <style>
 body { font-family: Arial; padding:20px }
 table { width:100%; border-collapse: collapse }
 th, td { border:1px solid #000; padding:6px }
 img { width:100px }
 </style>
 </head>
 <body>
 <div style="text-align:center">
 <img src="COLE_SUA_LOGO_BASE64_AQUI">
 <h2>Relatório de Obras</h2>
 </div>
 ${tabela}
 <script>window.print()<\/script>
 </body>
 </html>
 `);
}

function exportarExcel() {
 let csv = "Nº,Rua,Bairro,Tipo,Solicitante,Memorando,Data\n";
 registros.forEach(r => {
  csv += `${r.numero},${r.rua},${r.bairro},${r.tipo},${r.solicitante},${r.memorando},${r.data}\n`;
 });

 const blob = new Blob([csv], { type: 'text/csv' });
 const link = document.createElement("a");
 link.href = URL.createObjectURL(blob);
 link.download = "obras.csv";
 link.click();
}

render();
</script>

</body>
</html>
